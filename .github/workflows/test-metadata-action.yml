name: TEST metadata-action

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-default-template:
    name: Test Default Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Metadata Action
        id: metadata
        uses: ./actions/metadata-action
        with:
          show-report: "true"

      - name: Verify Outputs
        shell: bash
        run: |
          echo "=== Outputs ==="
          RESULT="${{ steps.metadata.outputs.result }}"
          REF="${{ steps.metadata.outputs.ref }}"
          REF_NAME="${{ steps.metadata.outputs.ref-name }}"
          DATE="${{ steps.metadata.outputs.date }}"
          TIME="${{ steps.metadata.outputs.time }}"
          TIMESTAMP="${{ steps.metadata.outputs.timestamp }}"
          DIST_TAG="${{ steps.metadata.outputs.dist-tag }}"
          SHORT_SHA="${{ steps.metadata.outputs.short-sha }}"
          RUN_NUMBER="${{ github.run_number }}"

          echo "result: $RESULT"
          echo "ref: $REF"
          echo "ref-name: $REF_NAME"
          echo "date: $DATE"
          echo "time: $TIME"
          echo "timestamp: $TIMESTAMP"
          echo "dist-tag: $DIST_TAG"
          echo "short-sha: $SHORT_SHA"

          # Verify result matches default template: {{ref-name}}-{{timestamp}}-{{runNumber}}
          EXPECTED_RESULT="${REF_NAME}-${TIMESTAMP}-${RUN_NUMBER}"
          if [ "$RESULT" != "$EXPECTED_RESULT" ]; then
            echo "❌ ERROR: result doesn't match default template"
            echo "   Expected: $EXPECTED_RESULT"
            echo "   Got: $RESULT"
            exit 1
          fi

          # Verify ref is normalized (without "refs/" prefix)
          if [[ "$REF" == refs/* ]]; then
            echo "❌ ERROR: ref should be normalized (without 'refs/' prefix), got: $REF"
            exit 1
          fi

          # Verify date format (YYYYMMDD)
          if ! [[ "$DATE" =~ ^[0-9]{8}$ ]]; then
            echo "❌ ERROR: date format is invalid, expected YYYYMMDD, got: $DATE"
            exit 1
          fi

          # Verify time format (HHMMSS)
          if ! [[ "$TIME" =~ ^[0-9]{6}$ ]]; then
            echo "❌ ERROR: time format is invalid, expected HHMMSS, got: $TIME"
            exit 1
          fi

          # Verify timestamp format (YYYYMMDDHHMMSS)
          if ! [[ "$TIMESTAMP" =~ ^[0-9]{14}$ ]]; then
            echo "❌ ERROR: timestamp format is invalid, expected YYYYMMDDHHMMSS, got: $TIMESTAMP"
            exit 1
          fi

          # Verify short-sha length (default is 7)
          if [ ${#SHORT_SHA} -ne 7 ]; then
            echo "❌ ERROR: short-sha length should be 7, got: ${#SHORT_SHA}"
            exit 1
          fi

          # Verify default dist-tag
          if [ "$DIST_TAG" != "latest" ]; then
            echo "❌ ERROR: default dist-tag should be 'latest', got: $DIST_TAG"
            exit 1
          fi

          echo "✅ Default template test passed!"

  test-custom-template:
    name: Test Custom Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Metadata Action
        id: metadata
        uses: ./actions/metadata-action
        with:
          ref: "refs/heads/feature/test-branch"
          default-template: "custom-{{ref-name}}-{{date}}-{{time}}-{{short-sha}}"
          default-tag: "custom-tag"
          short-sha: "10"
          replace-symbol: "_"
          show-report: "true"

      - name: Verify Outputs
        shell: bash
        run: |
          echo "=== Input Transformation ==="
          INPUT_REF="refs/heads/feature/test-branch"
          REPLACE_SYMBOL="_"
          echo "1. Input ref: $INPUT_REF"
          echo "2. After removing 'refs/heads/': feature/test-branch"
          echo "3. After applying replace-symbol '$REPLACE_SYMBOL': feature_test-branch"

          echo ""
          echo "=== Outputs ==="
          RESULT="${{ steps.metadata.outputs.result }}"
          REF="${{ steps.metadata.outputs.ref }}"
          REF_NAME="${{ steps.metadata.outputs.ref-name }}"
          DATE="${{ steps.metadata.outputs.date }}"
          TIME="${{ steps.metadata.outputs.time }}"
          DIST_TAG="${{ steps.metadata.outputs.dist-tag }}"
          SHORT_SHA="${{ steps.metadata.outputs.short-sha }}"
          MAJOR="${{ steps.metadata.outputs.major }}"
          MINOR="${{ steps.metadata.outputs.minor }}"
          PATCH="${{ steps.metadata.outputs.patch }}"

          echo "result: $RESULT"
          echo "ref: $REF"
          echo "ref-name: $REF_NAME"
          echo "date: $DATE"
          echo "time: $TIME"
          echo "dist-tag: $DIST_TAG"
          echo "short-sha: $SHORT_SHA"
          echo "major: $MAJOR"
          echo "minor: $MINOR"
          echo "patch: $PATCH"

          if [ "$REF" != "feature_test-branch" ]; then
            echo "❌ ERROR: ref should be 'feature_test-branch', got: $REF"
            exit 1
          fi

          if [ "$REF_NAME" != "feature_test-branch" ]; then
            echo "❌ ERROR: ref-name should be 'feature_test-branch', got: $REF_NAME"
            exit 1
          fi

          EXPECTED_RESULT="custom-${REF_NAME}-${DATE}-${TIME}-${SHORT_SHA}"
          if [ "$RESULT" != "$EXPECTED_RESULT" ]; then
            echo "❌ ERROR: result doesn't match custom template"
            echo "   Expected: $EXPECTED_RESULT"
            echo "   Got: $RESULT"
            exit 1
          fi

          if [ "$DIST_TAG" != "custom-tag" ]; then
            echo "❌ ERROR: dist-tag should be 'custom-tag', got: $DIST_TAG"
            exit 1
          fi

          if [ ${#SHORT_SHA} -ne 10 ]; then
            echo "❌ ERROR: short-sha length should be 10, got: ${#SHORT_SHA}"
            exit 1
          fi

          echo "✅ Custom template test passed!"

  test-github-context:
    name: Test GitHub Context Variables
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Metadata Action with GitHub Context
        id: metadata
        uses: ./actions/metadata-action
        with:
          default-template: "build-{{github.workflow}}-{{github.sha}}-run{{github.run_number}}"
          default-tag: "context-tag"
          show-report: "true"

      - name: Verify GitHub Context Outputs
        shell: bash
        run: |
          RESULT="${{ steps.metadata.outputs.result }}"
          GITHUB_SHA="${{ github.sha }}"
          SHORT_SHA="${{ steps.metadata.outputs.short-sha }}"

          echo "result: $RESULT"
          echo "github.sha: $GITHUB_SHA"
          echo "short-sha: $SHORT_SHA"

          if [[ "$RESULT" == *"{{"* ]] || [[ "$RESULT" == *"}}"* ]]; then
            echo "❌ ERROR: result still contains template placeholders"
            exit 1
          fi

          if [[ ! "$RESULT" == build-* ]]; then
            echo "❌ ERROR: result should start with 'build-'"
            exit 1
          fi

          if [[ ! "$RESULT" == *"$GITHUB_SHA"* ]]; then
            echo "❌ ERROR: result should contain full GitHub SHA"
            exit 1
          fi

          EXPECTED_SHORT_SHA="${GITHUB_SHA:0:7}"
          if [ "$SHORT_SHA" != "$EXPECTED_SHORT_SHA" ]; then
            echo "❌ ERROR: short-sha should be first 7 chars of full SHA"
            exit 1
          fi

          echo "✅ GitHub context test passed!"

  test-inline-length-modifier:
    name: Test Inline Length Modifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Metadata Action with inline length modifier
        id: metadata
        uses: ./actions/metadata-action
        with:
          ref: "refs/heads/feature/test-branch"
          default-template: "{{ref-name:7}}-{{short-sha:4}}"
          show-report: "true"

      - name: Verify inline length modifier outputs
        shell: bash
        run: |
          RESULT="${{ steps.metadata.outputs.result }}"
          echo "result: $RESULT"

          # ref-name for "refs/heads/feature/test-branch" with default replace-symbol "-" = "feature-test-branch"
          # sliced to 7 -> "feature"
          # short-sha default 7 chars, sliced to 4 -> first 4 chars
          EXPECTED_PREFIX="feature-"
          if [[ "$RESULT" != feature-* ]]; then
            echo "❌ ERROR: result should start with 'feature-', got: $RESULT"
            exit 1
          fi

          # Total length should be 7 + 1 + 4 = 12 (ref-name:7 + dash + short-sha:4)
          if [ ${#RESULT} -ne 12 ]; then
            echo "❌ ERROR: result length should be 12, got: ${#RESULT} ('$RESULT')"
            exit 1
          fi

          echo "✅ Inline length modifier test passed!"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: actions/metadata-action
        run: npm install

      - name: Run unit tests
        working-directory: actions/metadata-action
        run: npm test

      - name: Build dist
        working-directory: actions/metadata-action
        run: npm run build

      - name: Verify dist exists
        run: test -f actions/metadata-action/dist/index.js && echo "✅ dist/index.js exists"
